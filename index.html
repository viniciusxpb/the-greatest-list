<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Uma lista de coisas que não precisavam ser tão boas, traições imperdoáveis e decepções previsíveis.">
  <meta name="theme-color" content="#0d0d1a">

  <title>Coisas Que Não Precisavam Ser Tão Boas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" data-app data-tab="boas">
    <nav class="tabs" data-tabs aria-label="Seleção de aba">
      <button class="tab tab--boas is-active" type="button" data-tab="boas">Boas Demais</button>
      <button class="tab tab--chosen" type="button" data-tab="chosen">Chosen One</button>
      <button class="tab tab--meh" type="button" data-tab="meh">Nem Isso?</button>
    </nav>

    <header class="intro">
      <h1 class="intro__title">
        <span data-title-line1></span>
        <br>
        <span class="intro__title-accent" data-title-line2></span>
      </h1>
      <p class="intro__subtitle" data-subtitle></p>
    </header>

    <section class="filters" data-filters aria-label="Filtrar por categoria"></section>

    <section class="list" data-list aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
